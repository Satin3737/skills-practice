<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Web worker practice</title>
    </head>
    <body>
        <main class="main">
            <h1 class="title">Web Worker demo</h1>
            <div class="controls">
                <button class="button button-primary" data-action="worker">Run in Worker</button>
                <button class="button button-secondary" data-action="main">Run on Main Thread</button>
            </div>
            <div class="result" data-result>Result will appear here</div>
            <div class="counter">
                Counter:
                <span data-counter> 0 </span>
            </div>
        </main>
        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
