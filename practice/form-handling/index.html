<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Form handling practice</title>
    </head>
    <body>
        <main>
            <form class="form" novalidate data-form>
                <h1 class="title">Wow, it's fancy form handling</h1>
                <fieldset class="fields">
                    <legend class="legend">Fill form data:</legend>
                    <label class="field">
                        Name
                        <input type="text" name="name" placeholder="Some name" />
                        <span class="error"></span>
                    </label>
                    <label class="field">
                        Surname
                        <input type="text" name="surname" placeholder="Some surname" />
                        <span class="error"></span>
                    </label>
                    <label class="field">
                        Age
                        <input type="number" inputmode="numeric" name="age" placeholder="Some age" />
                        <span class="error"></span>
                    </label>
                    <label class="field">
                        E-mail
                        <input type="email" name="email" placeholder="example@mail.com" />
                        <span class="error"></span>
                    </label>
                    <fieldset class="radio-group">
                        <legend class="legend">Your favorite color:</legend>
                        <div class="radios">
                            <label class="radio">
                                <input type="radio" name="color" value="red" />
                                <span class="box" aria-hidden="true"></span>
                                Red
                            </label>
                            <label class="radio">
                                <input type="radio" name="color" value="yellow" />
                                <span class="box" aria-hidden="true"></span>
                                Yellow
                            </label>
                            <label class="radio">
                                <input type="radio" name="color" value="green" />
                                <span class="box" aria-hidden="true"></span>
                                Green
                            </label>
                        </div>
                        <span class="error"></span>
                    </fieldset>
                    <fieldset class="checkbox-group">
                        <legend class="legend">Describe yourself:</legend>
                        <div class="checkboxes">
                            <label class="checkbox">
                                <input type="checkbox" name="best" value="yes" />
                                <span class="box" aria-hidden="true"></span>
                                I'm the best of the best
                            </label>
                            <label class="checkbox">
                                <input type="checkbox" name="rock" value="yes" />
                                <span class="box" aria-hidden="true"></span>
                                I wanna rock
                            </label>
                            <label class="checkbox">
                                <input type="checkbox" name="sad" value="yes" />
                                <span class="box" aria-hidden="true"></span>
                                Nobody likes me
                            </label>
                        </div>
                        <span class="error"></span>
                    </fieldset>
                    <label class="field">
                        Comment
                        <textarea name="comment" placeholder="Well, some comment here"></textarea>
                        <span class="error"></span>
                    </label>
                </fieldset>
                <div class="response response-success" data-response="success">
                    <h2 class="title">We good</h2>
                </div>
                <div class="response response-error" data-response="error">
                    <h2 class="title">Something went wrong</h2>
                </div>
                <button type="submit" class="button button-primary submit">
                    Submit
                    <span class="spinner" aria-label="loading" role="status"></span>
                </button>
            </form>
        </main>
        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
